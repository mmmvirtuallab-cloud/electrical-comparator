# File: .github/workflows/nextjs-pages.yml

name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checks out your 'main' branch code
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. Sets up Node.js and caches node_modules
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # <-- THIS LINE IS NEW (Caches node_modules)

      # 3. This new step caches your Next.js build folder
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          # Create a cache key based on your lock file and source files
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      # 4. Installs dependencies and builds the static site
      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build

      # 5. Deploys the 'out' folder to your 'gh-pages' branch
      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out